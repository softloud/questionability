qn_project:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost
      user: "{{ env_var('DATABASE_USER') }}"
      password: "{{ env_var('DATABASE_PASSWORD') }}"
      port: 5432
      dbname: "{{ env_var('DATABASE') }}"
      schema: public
      threads: 4
      keepalives_idle: 0
      sslmode: prefer